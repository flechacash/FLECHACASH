<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlechaCash</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111111, #2B2B2B);
      color: white;
      min-height: 100vh;
    }

    .topbar {
      background: #FF3B3B;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-size: 24px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: auto;
      padding: 30px 20px;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 5px;
      color: #FF3B3B;
    }

    .phone {
      color: #cccccc;
      margin-bottom: 25px;
    }

    .balance-card {
      background: #1E1E1E;
      border: 1px solid #FF3B3B;
      border-radius: 15px;
      padding: 25px;
      text-align: left;
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(255, 59, 59, 0.3);
    }

    .balance-card p {
      color: #bbbbbb;
      margin-bottom: 5px;
    }

    .balance-card h2 {
      margin-bottom: 20px;
      font-size: 38px;
      color: white;
    }

    .btn {
      display: block;
      width: 100%;
      background: #1E1E1E;
      border: 1px solid #FF3B3B;
      color: white;
      padding: 18px;
      margin-bottom: 15px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #FF3B3B;
      transform: scale(1.02);
    }

    .movement {
      margin-top: 25px;
      background: #1E1E1E;
      border: 1px solid #FF3B3B;
      border-radius: 15px;
      padding: 20px;
      text-align: left;
      box-shadow: 0 0 15px rgba(255, 59, 59, 0.3);
    }

    .movement h3 {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }

    .ticket {
      background: #111111;
      border: 1px solid #FF3B3B;
      border-radius: 10px;
      padding: 15px;
      color: white;
    }

    .status {
      color: #FF3B3B;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    ☰
    <span>FlechaCash</span>
    ☎️
  </div>

  <div class="container">

    <div class="logo">💸</div>

    <h1>FlechaCash</h1>
    <p class="phone">+52 9617163082</p>

    <div class="balance-card">
      <p>Solde du vendeur</p>
      <h2>MXN $0.00</h2>

      <p>Retenu</p>
      <h2>MXN $0.00</h2>
    </div>

    <a href="#" class="btn">MONCASH</a>
    <a href="#" class="btn">NATCASH</a>
    <a href="#" class="btn">TOP UP</a>
    <a href="#" class="btn">DEPOSIT</a>
    <a href="#" class="btn">PARYAJ PAM</a>

    <div class="movement">
      <h3>Mouvements</h3>

      <div class="ticket">
        <strong>#FLECHA001</strong><br>
        MonCash / NatCash / Top Up

        <div class="status">✔️ Transaction disponible</div>
      </div>
    </div>

  </div>

</body>
</html>
