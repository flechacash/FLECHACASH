<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlechaCash Dashboard</title>

<style>

body{
margin:0;
padding:0;
background:#f4f7fb;
font-family:Arial,sans-serif;
}

.topbar{
height:60px;
background:linear-gradient(90deg,#007bff,#00c6ff);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
color:white;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:0 auto;
padding:20px;
}
.card{ position:relative;
background:linear-gradient(90deg,#007bff,#00c6ff);
padding:25px;
display:flex;
flex-direction:column;
justify-content:space-between;
border-radius:20px;
color:white;
margin-bottom:25px;
box-sizing:border-box;
min-height:160px;
}
.card h2{
margin:0;
font-size:18px;
}

.card h1{
margin:10px 0;
font-size:42px;
}
.eye-btn{
    position:absolute;
    right:20px;
    top:95px;

    background:rgba(255,255,255,0.2);

    border:none;

    color:white;

    width:40px;
    height:40px;

    border-radius:50%;

    font-size:20px;

    cursor:pointer;
}
.btn{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#007bff,#00c6ff);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.modal-content{
background:white;
width:90%;
max-width:400px;
margin:40px auto;
padding:20px;
border-radius:20px;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

select,input{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

.submit-btn{
width:100%;
box-sizing:border-box;
padding:15px;
border:none;
border-radius:12px;
background:#2196f3;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>
<div class="topbar">
   <button class="menu-btn">☰</button>

   <span>FlechaCash</span>

   <button class="call-btn">📞</button>
</div>

<div class="container">

<div class="card">
<h2>Solde du vendeur</h2>
<h1>MXN $0.00</h1>

<h2>Retenu</h2>
<h1>MXN $0.00</h1>
 <button class="eye-btn">◉</button>
</div>

<button class="btn" onclick="openModal('moncashModal')">MONCASH</button>

<button class="btn" onclick="openModal('natcashModal')">NATCASH</button>

<button class="btn">TOP UP</button>

<button class="btn">DEPOSIT</button>

<button class="btn">SGL PARIAGE</button>

</div>

<!-- MONCASH -->

<div id="moncashModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal('moncashModal')">&times;</span>

<h2>MonCash</h2>

<select onchange="countrySelected(this.value)">
<option value="">Choisir un pays</option>

<option>🇭🇹 Haïti +509</option>
<option>🇩🇴 République Dominicaine +1</option>
<option>🇨🇺 Cuba +53</option>
<option>🇯🇲 Jamaïque +1</option>
<option>🇺🇸 United States +1</option>
<option>🇨🇦 Canada +1</option>
<option>🇲🇽 México +52</option>
<option>🇨🇴 Colombia +57</option>
<option>🇧🇷 Brazil +55</option>
<option>🇦🇷 Argentina +54</option>
<option>🇨🇱 Chile +56</option>

</select>

<input type="text" placeholder="Expéditeur">

<input type="text" placeholder="Téléphone">

<input type="text" placeholder="Bénéficiaire">

<input type="number" placeholder="Montant MXN">

<button class="submit-btn">
Soumettre
</button>

</div>
</div>

<!-- NATCASH -->

<div id="natcashModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal('natcashModal')">&times;</span>

<h2>NatCash</h2>

<select onchange="countrySelected(this.value)">
<option value="">Choisir un pays</option>

<option>🇭🇹 Haïti +509</option>
<option>🇩🇴 République Dominicaine +1</option>
<option>🇨🇺 Cuba +53</option>
<option>🇯🇲 Jamaïque +1</option>
<option>🇺🇸 United States +1</option>
<option>🇨🇦 Canada +1</option>
<option>🇲🇽 México +52</option>

</select>

<input type="text" placeholder="Expéditeur">

<input type="text" placeholder="Téléphone">

<input type="text" placeholder="Bénéficiaire">

<input type="number" placeholder="Montant MXN">

<button class="submit-btn">
Soumettre
</button>

</div>
</div>

<script>

function openModal(id){
document.getElementById(id).style.display="block";
}

function closeModal(id){
document.getElementById(id).style.display="none";
}

function countrySelected(country){
console.log("Pays sélectionné:",country);
}

</script>

</body>
</html>
