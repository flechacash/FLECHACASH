<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlechaCash</title>
<style>
    body {
        background-color: #1A1A1A;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    .logo img {
        width: 200px;
        margin: 20px 0;
    }

    h1 {
        color: #FFD700;
        font-size: 46px;
        margin-bottom: 10px;
        text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
    }

    .balance-card {
        display: inline-block;
        border: 1px solid #FFD700;
        border-radius: 16px;
        padding: 25px;
        margin: 15px;
        min-width: 200px;
        color: #ffffff;
        text-align: left;
    }

    .balance-card p {
        margin: 5px 0;
        font-size: 16px;
    }

    .flecha-pariage, .top-up-btn {
        color: #FFD700;
        font-size: 24px;
        margin: 20px 0;
        padding: 20px;
        border: 2px solid #FFD700;
        border-radius: 12px;
        text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700;
        cursor: pointer;
        display: inline-block;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .flecha-pariage:hover, .top-up-btn:hover {
        background-color: #FFE033;
        color: #1A1A1A;
        box-shadow: 0 0 15px #FFD700;
    }

    .contact-btn {
        background-color: #FFD700;
        color: #1A1A1A;
        font-size: 20px;
        padding: 15px 40px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin: 20px 0;
        transition: all 0.3s ease;
    }

    .contact-btn:hover {
        background-color: #FFE033;
        box-shadow: 0 0 15px #FFD700;
    }
</style>
</head>
<body>

<div class="logo">
    <img src="logo.png" alt="FlechaCash Logo">
</div>

<h1>FlechaCash</h1>

<div class="balance-card">
    <p>Solde du vendeur</p>
    <p>MXN $0.00</p>
</div>

<div class="balance-card">
    <p>Retenu</p>
    <p>MXN $0.00</p>
</div>

<!-- Flecha PARIAGE Button -->
<a href="https://link-to-flecha-pariage.com" class="flecha-pariage">Flecha PARIAGE<br>Jwe ak ekip ou a epi swiv rezilta yo fasil!</a>

<!-- MonCash / NatCash Top Up Button -->
<a href="https://link-to-top-up.com" class="top-up-btn">MonCash / NatCash Top Up</a>

<!-- Contact Button -->
<a href="https://link-to-contact-info.com" class="contact-btn">Kontakte Mwen</a>

</body>
</html>
