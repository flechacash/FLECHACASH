<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlechaCash Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 15px;
        }

        .logo {
            display: block;
            margin: 0 auto 10px auto;
            width: 120px;
            height: auto;
        }

        h1 {
            color: #FF6838;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .balance-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .balance-card {
            background: #1A1A1A;
            border: 1px solid #C0392B;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            text-align: left;
        }

        .balance-card h2 {
            margin-top: 0;
            font-size: 16px;
        }

        .balance-card p {
            font-size: 16px;
            margin: 5px 0 0 0;
        }

        .actions button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background-color: #FF6838;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .actions button:hover {
            background-color: #e65c1f;
        }

        .pariage-section {
            margin-top: 20px;
            background-color: #1A1A1A;
            border: 1px solid #FF6838;
            border-radius: 12px;
            padding: 15px;
        }

        .pariage-section h2 {
            font-size: 18px;
            margin-top: 0;
            color: #FF6838;
        }

        .pariage-section p {
            font-size: 16px;
            margin: 5px 0 0 0;
        }

        @media (max-width: 400px) {
            .balance-grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="FlechaCash Logo" class="logo">
        <h1>FlechaCash</h1>

        <div class="balance-grid">
            <div class="balance-card">
                <h2>Solde du vendeur</h2>
                <p>MXN $0.00</p>
            </div>
            <div class="balance-card">
                <h2>Retenu</h2>
                <p>MXN $0.00</p>
            </div>
        </div>

        <div class="pariage-section">
            <h2>Flecha PARIAGE</h2>
            <p>Jwe ak ekip ou a epi swiv rezilta yo fasil!</p>
        </div>

        <div class="actions">
            <button onclick="openContact()">Kontakte Mwen</button>
        </div>
    </div>

    <script>
        function openContact() {
            const contactLinks = [
                "https://www.tiktok.com/@username",
                "https://www.instagram.com/username",
                "https://www.facebook.com/username",
                "https://wa.me/529617163082"
            ];
            let msg = "Kontakte mwen sou: \n";
            contactLinks.forEach((link, index) => {
                msg += `${index + 1}. ${link}\n`;
            });
            alert(msg);
        }
    </script>
</body>
</html>
