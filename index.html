<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlechaCash</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#ead7c8;color:#333}

.header{
  height:58px;background:linear-gradient(90deg,#1e88e5,#00bcd4);
  color:white;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:bold;position:relative
}
.menu{position:absolute;left:15px;font-size:30px;cursor:pointer}
.call{position:absolute;right:15px;background:#ddd0c5;color:#b33;border-radius:50%;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}

.container{max-width:720px;margin:28px auto;padding:0 15px}
.balance{
  background:linear-gradient(120deg,#1e88e5,#00bcd4);color:white;border-radius:14px;
  padding:25px;position:relative;margin-bottom:24px
}
.balance h4{font-size:15px;margin-bottom:7px}
.balance .money{font-size:34px;font-weight:bold;margin-bottom:14px}
.eye{position:absolute;right:25px;top:95px;background:rgba(255,255,255,.25);
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.btn{
  width:100%;padding:15px;margin:8px 0;border:0;border-radius:9px;
  color:white;font-weight:bold;background:linear-gradient(90deg,#1e88e5,#00bcd4);
  cursor:pointer;font-size:15px
}

.side{
  display:none;position:fixed;top:58px;left:0;width:230px;height:100%;
  background:white;z-index:99;box-shadow:2px 0 12px #0005;padding:15px
}
.side p{padding:14px;border-bottom:1px solid #ddd;font-weight:bold}

.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:999;align-items:center;justify-content:center;padding:15px
}
.box{
  width:100%;max-width:640px;background:#f5efe8;border-radius:4px;
  box-shadow:0 8px 25px #0006;overflow:hidden
}
.modal-head{
  height:70px;background:#1976d2;color:white;display:flex;align-items:center;
  justify-content:center;font-size:25px;position:relative
}
.close{
  position:absolute;right:18px;background:#ddd;color:#333;border-radius:50%;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-weight:bold
}
.modal-body{padding:22px 28px}
.rate{text-align:center;color:#8b3f38;font-size:26px;font-weight:bold;margin-bottom:15px}

.row{
  display:flex;align-items:center;border-bottom:1px solid #b9b0aa;padding:10px 0
}
.icon{width:45px;font-size:26px;color:#555;text-align:center}
.field{flex:1}
.field label{display:block;font-size:15px;color:#555;margin-bottom:3px}
.field input,.field select{
  width:100%;border:0;background:transparent;font-size:22px;outline:0;color:#333
}
.field select{cursor:pointer}

.info{text-align:center;font-size:19px;line-height:1.4;margin:14px 0;color:#333}
.action{
  width:100%;height:44px;margin-top:10px;border:1px solid #888;background:#f7f3ef;
  font-size:20px;color:#337ab7;cursor:pointer
}
.action span{font-size:28px;margin-right:12px}

@media(max-width:600px){
  .box{max-width:96%}
  .modal-head{font-size:22px}
  .field input,.field select{font-size:18px}
  .rate{font-size:23px}
}
</style>
</head>

<body>

<div class="header">
  <div class="menu" onclick="toggleMenu()">☰</div>
  FlechaCash
  <div class="call" onclick="window.location.href='tel:+529617163082'">☎</div>
</div>

<div class="side" id="sideMenu">
  <p>🏠 Accueil</p>
  <p>💰 Solde</p>
  <p>🇭🇹 MonCash</p>
  <p>🇭🇹 NatCash</p>
  <p>📲 Top Up</p>
  <p>💳 Deposit</p>
  <p>🎯 SGL Pariage</p>
</div>

<div class="container">
  <div class="balance">
    <h4>Solde du vendeur</h4>
    <div class="money" id="sellerBalance">MXN $0.00</div>
    <h4>Retenu</h4>
    <div class="money" id="retenuBalance">MXN $0.00</div>
    <div class="eye">◎</div>
  </div>

  <button class="btn" onclick="openService('Moncash')">MONCASH</button>
  <button class="btn" onclick="openService('Natcash')">NATCASH</button>
  <button class="btn" onclick="openService('Top Up')">TOP UP</button>
  <button class="btn" onclick="openService('Deposit')">DEPOSIT</button>
  <button class="btn" onclick="openService('SGL Pariage')">SGL PARIAGE</button>
</div>

<div class="modal" id="modal">
  <div class="box">
    <div class="modal-head">
      <span id="modalTitle">Moncash</span>
      <div class="close" onclick="closeModal()">×</div>
    </div>

    <div class="modal-body">
      <div class="rate">MXN $2.33</div>

      <div class="row">
        <div class="icon">🌎</div>
        <div class="field">
          <label>Pays</label>
          <select id="country">
            <option value="">Choisir un pays</option>
            <option>🇭🇹 Haïti</option>
            <option>🇲🇽 Mexique</option>
            <option>🇺🇸 États-Unis</option>
            <option>🇨🇦 Canada</option>
            <option>🇧🇷 Brésil</option>
            <option>🇨🇱 Chili</option>
            <option>🇩🇴 République Dominicaine</option>
            <option>🇨🇺 Cuba</option>
            <option>🇻🇪 Venezuela</option>
            <option>🇨🇴 Colombie</option>
            <option>🇵🇪 Pérou</option>
            <option>🇪🇨 Équateur</option>
            <option>🇦🇷 Argentine</option>
            <option>🇫🇷 France</option>
            <option>🇪🇸 Espagne</option>
          </select>
        </div>
      </div>

      <div class="row" id="senderRow">
        <div class="icon">👤</div>
        <div class="field">
          <input id="sender" placeholder="Expéditeur">
        </div>
      </div>

      <div class="row" id="emailRow">
        <div class="icon">👤</div>
        <div class="field">
          <input id="email" placeholder="E-mail/Cédula/CPF">
        </div>
      </div>

      <div class="row" id="depositTypeRow">
        <div class="icon">⇄</div>
        <div class="field">
          <select id="depositType">
            <option value="">Deposit Type</option>
            <option>Bank</option>
            <option>Wallet</option>
            <option>Pix</option>
            <option>Card</option>
            <option>Cash</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="icon">☎</div>
        <div class="field">
          <input id="phone" placeholder="Téléphone">
        </div>
      </div>

      <div class="row" id="companyRow">
        <div class="icon">▯</div>
        <div class="field">
          <select id="company">
            <option value="">Compagnie</option>
            <option>MonCash</option>
            <option>NatCash</option>
            <option>Digicel</option>
            <option>Natcom</option>
            <option>Telcel</option>
            <option>Movistar</option>
            <option>AT&T</option>
            <option>Autre</option>
          </select>
        </div>
      </div>

      <div class="row" id="beneficiaryRow">
        <div class="icon">👤</div>
        <div class="field">
          <input id="beneficiary" placeholder="Bénéficiaire">
        </div>
      </div>

      <div class="row">
        <div class="icon">💵</div>
        <div class="field">
          <label>Montant envoyé (MXN)</label>
          <input id="amount" type="number" value="0" oninput="calculateLive()">
        </div>
      </div>

      <div class="info">
        <div id="commissionText">Commission pour agent 0.00 MXN</div>
        <div id="receiveText">Le montant à recevoir est de --</div>
      </div>

      <button class="action" onclick="submitForm()"><span>➤</span>Soumettre</button>
      <button class="action" onclick="resetForm()"><span>↻</span>Reset</button>
    </div>
  </div>
</div>

<script>
let currentService = "";

function toggleMenu(){
  const m=document.getElementById("sideMenu");
  m.style.display = m.style.display==="block" ? "none" : "block";
}

function openService(service){
  currentService = service;
  document.getElementById("modalTitle").innerText = service;
  document.getElementById("modal").style.display = "flex";

  document.getElementById("senderRow").style.display = "none";
  document.getElementById("emailRow").style.display = "none";
  document.getElementById("depositTypeRow").style.display = "none";
  document.getElementById("companyRow").style.display = "none";
  document.getElementById("beneficiaryRow").style.display = "none";

  if(service==="Moncash" || service==="Natcash"){
    document.getElementById("senderRow").style.display = "flex";
    document.getElementById("beneficiaryRow").style.display = "flex";
  }

  if(service==="Top Up"){
    document.getElementById("companyRow").style.display = "flex";
  }

  if(service==="Deposit"){
    document.getElementById("emailRow").style.display = "flex";
    document.getElementById("depositTypeRow").style.display = "flex";
    document.getElementById("beneficiaryRow").style.display = "flex";
  }

  if(service==="SGL Pariage"){
    document.getElementById("senderRow").style.display = "flex";
    document.getElementById("beneficiaryRow").style.display = "flex";
  }

  resetForm(false);
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function calculateLive(){
  const amount = Number(document.getElementById("amount").value) || 0;
  const commission = amount * 0.02;
  const receive = amount * 6.2;

  document.getElementById("commissionText").innerText =
    "Commission pour agent " + commission.toFixed(2) + " MXN";

  document.getElementById("receiveText").innerText =
    amount > 0 ? "Le montant à recevoir est de " + receive.toLocaleString("fr-FR") + " G HTG"
               : "Le montant à recevoir est de --";
}

function submitForm(){
  const amount = Number(document.getElementById("amount").value) || 0;
  const commission = amount * 0.02;

  document.getElementById("sellerBalance").innerText = "MXN $" + amount.toFixed(2);
  document.getElementById("retenuBalance").innerText = "MXN $" + commission.toFixed(2);

  alert("Transaction soumise avec succès.");
}

function resetForm(clear=true){
  document.getElementById("country").value="";
  document.getElementById("sender").value="";
  document.getElementById("email").value="";
  document.getElementById("depositType").value="";
  document.getElementById("phone").value="";
  document.getElementById("company").value="";
  document.getElementById("beneficiary").value="";
  document.getElementById("amount").value=0;
  calculateLive();
}

window.onclick=function(e){
  const modal=document.getElementById("modal");
  if(e.target===modal){closeModal()}
}
</script>

</body>
</html>
