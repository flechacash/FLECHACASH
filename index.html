<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlechaCash Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#f4e5d6;color:white}

.header{
  background:linear-gradient(90deg,#1e88e5,#00bcd4);
  height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-size:24px;
  font-weight:bold;
}

.menu{
  position:absolute;
  left:15px;
  font-size:28px;
  cursor:pointer;
}

.call{
  position:absolute;
  right:15px;
  width:38px;
  height:38px;
  background:#e0d0bd;
  color:#b53b2f;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}

.container{
  max-width:720px;
  margin:25px auto;
  padding:0 15px;
}

.balance-card{
  background:linear-gradient(120deg,#1e88e5,#00bcd4);
  border-radius:15px;
  padding:25px;
  min-height:170px;
  position:relative;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.balance-card h4{
  font-size:16px;
  margin-bottom:8px;
}

.amount{
  font-size:36px;
  font-weight:bold;
  margin-bottom:15px;
}

.small-icon{
  position:absolute;
  right:25px;
  top:85px;
  width:26px;
  height:26px;
  border-radius:50%;
  background:rgba(255,255,255,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.buttons{
  margin-top:25px;
}

.service-btn{
  width:100%;
  padding:16px;
  margin-bottom:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#1e88e5,#00bcd4);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.service-btn:hover{
  opacity:.9;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.55);
  align-items:center;
  justify-content:center;
  padding:15px;
  z-index:999;
}

.modal-content{
  background:white;
  color:#222;
  width:100%;
  max-width:430px;
  border-radius:18px;
  padding:22px;
  position:relative;
}

.close{
  position:absolute;
  top:12px;
  right:16px;
  font-size:26px;
  cursor:pointer;
}

.modal-content h2{
  color:#1e88e5;
  margin-bottom:15px;
}

label{
  display:block;
  margin-top:12px;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:15px;
}

.submit{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#1e88e5,#00bcd4);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:15px;
  background:#eef7ff;
  color:#111;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  line-height:1.6;
}

.side-menu{
  display:none;
  position:fixed;
  top:58px;
  left:0;
  width:230px;
  background:white;
  color:#222;
  height:100%;
  z-index:1000;
  padding:20px;
  box-shadow:3px 0 12px rgba(0,0,0,.25);
}

.side-menu p{
  padding:12px;
  border-bottom:1px solid #ddd;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu" onclick="toggleMenu()">☰</div>
  FlechaCash
  <div class="call" onclick="callNow()">☎</div>
</div>

<div class="side-menu" id="sideMenu">
  <p>🏠 Accueil</p>
  <p>💰 Solde</p>
  <p>📲 Top Up</p>
  <p>🇭🇹 MonCash</p>
  <p>🎯 SGL Pariage</p>
  <p>📞 Contact</p>
</div>

<div class="container">

  <div class="balance-card">
    <h4>Solde du vendeur</h4>
    <div class="amount" id="sellerBalance">MXN $0.00</div>

    <h4>Retenu</h4>
    <div class="amount" id="retenuBalance">MXN $0.00</div>

    <div class="small-icon">◎</div>
  </div>

  <div class="buttons">
    <button class="service-btn" onclick="openModal('MONCASH')">MONCASH</button>
    <button class="service-btn" onclick="openModal('NATCASH')">NATCASH</button>
    <button class="service-btn" onclick="openModal('TOP UP')">TOP UP</button>
    <button class="service-btn" onclick="openModal('DEPOSIT')">DEPOSIT</button>
    <button class="service-btn" onclick="openModal('SGL PARIAGE')">SGL PARIAGE</button>
  </div>

</div>

<div class="modal" id="serviceModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>

    <h2 id="modalTitle">Service</h2>

    <label>Pays</label>
    <select id="country">
      <option value="">Choisir un pays</option>
      <option>🇭🇹 Haïti</option>
      <option>🇲🇽 Mexique</option>
      <option>🇺🇸 États-Unis</option>
      <option>🇨🇦 Canada</option>
      <option>🇧🇷 Brésil</option>
      <option>🇨🇱 Chili</option>
      <option>🇩🇴 République Dominicaine</option>
      <option>🇨🇺 Cuba</option>
      <option>🇻🇪 Venezuela</option>
      <option>🇨🇴 Colombie</option>
      <option>🇵🇪 Pérou</option>
      <option>🇪🇨 Équateur</option>
      <option>🇦🇷 Argentine</option>
      <option>🇫🇷 France</option>
      <option>🇪🇸 Espagne</option>
    </select>

    <label>Téléphone</label>
    <input type="tel" id="phone" placeholder="Entrer le numéro">

    <label>Compagnie</label>
    <select id="company">
      <option value="">Choisir compagnie</option>
      <option>MonCash</option>
      <option>NatCash</option>
      <option>Digicel</option>
      <option>Natcom</option>
      <option>Telcel</option>
      <option>Movistar</option>
      <option>AT&T</option>
      <option>Autre</option>
    </select>

    <label>Montant envoyé MXN</label>
    <input type="number" id="amount" placeholder="Ex: 500">

    <label>Commission MXN</label>
    <input type="number" id="fee" placeholder="Ex: 20">

    <button class="submit" onclick="calculate()">Calculer</button>

    <div class="result" id="result">Résultat apparaîtra ici.</div>
  </div>
</div>

<script>
let currentService = "";

function toggleMenu(){
  const menu = document.getElementById("sideMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function callNow(){
  window.location.href = "tel:+529617163082";
}

function openModal(service){
  currentService = service;
  document.getElementById("modalTitle").innerText = service;
  document.getElementById("serviceModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("serviceModal").style.display = "none";
}

function calculate(){
  const country = document.getElementById("country").value;
  const phone = document.getElementById("phone").value;
  const company = document.getElementById("company").value;
  const amount = Number(document.getElementById("amount").value);
  const fee = Number(document.getElementById("fee").value);

  if(!country || !phone || !company || !amount){
    alert("Tanpri ranpli tout enfòmasyon yo.");
    return;
  }

  const total = amount + fee;

  document.getElementById("sellerBalance").innerText = "MXN $" + amount.toFixed(2);
  document.getElementById("retenuBalance").innerText = "MXN $" + fee.toFixed(2);

  document.getElementById("result").innerHTML =
    "Service: " + currentService + "<br>" +
    "Pays: " + country + "<br>" +
    "Téléphone: " + phone + "<br>" +
    "Compagnie: " + company + "<br>" +
    "Montant envoyé: MXN $" + amount.toFixed(2) + "<br>" +
    "Commission: MXN $" + fee.toFixed(2) + "<br>" +
    "Total à payer: MXN $" + total.toFixed(2);
}

window.onclick = function(event){
  const modal = document.getElementById("serviceModal");
  if(event.target === modal){
    closeModal();
  }
}
</script>

</body>
</html>
